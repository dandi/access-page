name: Daily tests

on:
    schedule:
        - cron: "0 12 * * *"
    workflow_dispatch:

jobs:
    build:
        name: Build
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: lts/*
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Build
              run: npm run build

    unit-tests:
        name: Unit tests (Vitest)
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: lts/*
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Run unit tests
              run: npm test

    integration-tests:
        name: Integration tests (Playwright)
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: lts/*
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Install Playwright browsers
              run: npx playwright install chromium --with-deps

            - name: Run integration tests
              run: npm run test:e2e

            - name: Upload Playwright report
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: playwright-report
                  path: playwright-report/
                  retention-days: 7

    notify-on-failure:
        runs-on: ubuntu-latest
        needs: [build, unit-tests, integration-tests]
        if: failure()
        permissions: {}
        steps:
            - uses: dawidd6/action-send-mail@v3
              with:
                  server_address: smtp.gmail.com
                  server_port: 465
                  username: ${{ secrets.MAIL_USERNAME }}
                  password: ${{ secrets.MAIL_PASSWORD }}
                  subject: "CI Failure: `usage-page` Daily tests"
                  to: cody.c.baker.phd@gmail.com
                  from: usage-page
                  body: |
                      The daily test run for the usage-page repository has failed.

                      Build:              ${{ needs.build.result }}
                      Unit tests:         ${{ needs.unit-tests.result }}
                      Integration tests:  ${{ needs.integration-tests.result }}

                      Please review the workflow run at https://github.com/dandi/usage-page/actions/workflows/daily-tests.yml
