name: Weekly npm audit

on:
    schedule:
        - cron: "0 8 * * 1"
    workflow_dispatch:

jobs:
    npm-audit:
        name: npm audit
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: lts/*
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Run npm audit
              run: npm audit

    notify-on-failure:
        runs-on: ubuntu-latest
        needs: [npm-audit]
        if: ${{ always() && needs.npm-audit.result == 'failure' }}
        permissions: {}
        steps:
            - uses: dawidd6/action-send-mail@v3
              with:
                  server_address: smtp.gmail.com
                  server_port: 465
                  username: ${{ secrets.MAIL_USERNAME }}
                  password: ${{ secrets.MAIL_PASSWORD }}
                  subject: "CI Failure: `usage-page` Weekly npm audit"
                  to: cody.c.baker.phd@gmail.com
                  from: usage-page
                  body: "The weekly npm audit check has failed for the usage-page repository. Please review the audit report at https://github.com/dandi/usage-page/actions/workflows/npm-audit.yml"
