<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dandiset Usage Summaries</title>

    <script>
      const GA_MEASUREMENT_ID = 'G-25PBWE3SLK';
      const ANALYTICS_CONSENT_KEY = 'analytics_consent';

      function getAnalyticsConsent() {
          try {
              return localStorage.getItem(ANALYTICS_CONSENT_KEY);
          } catch {
              return null;
          }
      }

      function setAnalyticsConsent(value) {
          try {
              localStorage.setItem(ANALYTICS_CONSENT_KEY, value);
          } catch {}
      }

      function loadGoogleAnalytics() {
          if (window.gtag) return;

          window.dataLayer = window.dataLayer || [];
          window.gtag = function(){ window.dataLayer.push(arguments); };
          window.gtag('js', new Date());
          window.gtag('config', GA_MEASUREMENT_ID);

          const gtagScript = document.createElement('script');
          gtagScript.async = true;
          gtagScript.src = `https://www.googletagmanager.com/gtag/js?id=${GA_MEASUREMENT_ID}`;
          document.head.appendChild(gtagScript);
      }

      document.addEventListener('DOMContentLoaded', () => {
          const banner = document.getElementById('cookie_consent_banner');
          const acceptBtn = document.getElementById('cookie_accept_btn');
          const declineBtn = document.getElementById('cookie_decline_btn');
          if (!banner || !acceptBtn || !declineBtn) return;

          const consent = getAnalyticsConsent();
          if (consent === 'accepted') {
              loadGoogleAnalytics();
              banner.hidden = true;
          } else if (consent === 'declined') {
              banner.hidden = true;
          } else {
              banner.hidden = false;
          }

          acceptBtn.addEventListener('click', () => {
              setAnalyticsConsent('accepted');
              loadGoogleAnalytics();
              banner.hidden = true;
          });

          declineBtn.addEventListener('click', () => {
              setAnalyticsConsent('declined');
              banner.hidden = true;
          });
      });
    </script>

    <link rel="icon" href="dandi-usage-favicon.ico" type="image/x-icon">

    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/topojson-client@3.1.0/dist/topojson-client.min.js"></script>
    <script src="https://cdn.plot.ly/plotly-3.0.1.min.js" charset="utf-8"></script>
    <script src="errors.js" defer></script>
    <script src="plots.js" defer></script>

</head>
<body>

            <div class="settings-panel" id="settings_panel" aria-hidden="true">

                <div class="SubControllerContainer">
                    <label for="log_scale">Log Scale</label>
                    <span class="info-icon" data-tooltip="Applies to non-geographic plots" tabindex="0" role="img" aria-label="Log Scale: Applies to non-geographic plots">i</span>
                    <input type="checkbox" id="log_scale" />
                </div>
                <div class="SubControllerContainer">
                    <label for="cumulative">Cumulative</label>
                    <span class="info-icon" data-tooltip="Only applies to usage over time" tabindex="0" role="img" aria-label="Cumulative: Only applies to usage over time">i</span>
                    <input type="checkbox" id="cumulative" />
                </div>
                <div class="SubControllerContainer">
                    <label for="top_n_dandisets">Top Dandisets</label>
                    <span class="info-icon" data-tooltip="Only applies to the 'group by' of usage over time" tabindex="0" role="img" aria-label="Top Dandisets: Only applies to the 'group by' of usage over time">i</span>
                    <input type="number" id="top_n_dandisets" min="1" value="8" />
                </div>
                <div class="SubControllerContainer">
                    <label for="prefix">Prefix</label>
                    <span class="info-icon" data-tooltip="Applies to totals and hover values" tabindex="0" role="img" aria-label="Prefix: Applies to totals and hover values">i</span>
                    <select id="prefix">
                        <option value="decimal">Decimal</option>
                        <option value="binary">Binary</option>
                    </select>
                </div>
            </div>
        </div>
    </div>
    <div id="totals"></div>

                <input type="radio" id="over_time_view_table" name="over_time_view" value="table" />

    <div class="ControllerContainer PlotViewControls" id="over_time_aggregate_controls">

            <div class="radio-toggle">
                <input type="radio" id="aggregation_daily" name="time_aggregation" value="daily" checked />
                <label for="aggregation_daily">Daily</label>
                <input type="radio" id="aggregation_weekly" name="time_aggregation" value="weekly" />
                <label for="aggregation_weekly">Weekly</label>
                <input type="radio" id="aggregation_monthly" name="time_aggregation" value="monthly" />
                <label for="aggregation_monthly">Monthly</label>
