<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dandiset Access Summaries</title>

    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/topojson-client@3.1.0/dist/topojson-client.min.js"></script>
    <script src="https://cdn.plot.ly/plotly-3.0.1.min.js" charset="utf-8"></script>
    <script src="errors.js" defer></script>
    <script src="plots.js" defer></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            /* ── Theme colors — adjust these variables to customize the color scheme ── */
            --color-bg: #1a1a2e;
            --color-surface: #16213e;
            --color-header: #0f3460;
            --color-border: #2a2a4a;
            --color-text: #e0e0e0;
            --color-text-secondary: #a0a0b0;
            --color-accent: #53a8b6;
            --color-accent-hover: #79c7d4;
            --color-accent-subtle: rgba(83, 168, 182, 0.08);
            /* ─────────────────────────────────────────────────────────────────────── */
            --font-main: 'Source Sans 3', -apple-system, sans-serif;
            --radius: 6px;
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-main);
            color: var(--color-text);
            background: var(--color-bg);
            margin: 0;
            padding: 0 0 40px;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Site header ── */
        .site-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0 20px;
            height: 48px;
            background: var(--color-header);
            border-bottom: 1px solid var(--color-border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .site-brand {
            text-decoration: none;
            color: var(--color-accent);
            font-size: 1em;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            white-space: nowrap;
            transition: color 0.15s;
        }

        .site-brand:hover {
            color: var(--color-accent-hover);
        }

        .site-title {
            color: var(--color-text-secondary);
            font-size: 0.9em;
            font-weight: 400;
        }

        .site-header-spacer {
            flex: 1;
        }

        .site-github-link {
            color: rgba(255, 255, 255, 0.4);
            text-decoration: none;
            display: flex;
            align-items: center;
            transition: color 0.2s;
        }

        .site-github-link:hover {
            color: rgba(255, 255, 255, 0.9);
        }

        .site-github-link svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        /* ── Page content ── */
        .page-content {
            padding: 0 20px;
        }

        h1 {
            font-weight: 300;
            font-size: 1.8em;
            letter-spacing: -0.01em;
            text-align: center;
            margin: 28px 0 16px;
            color: var(--color-text);
        }

        #totals {
            text-align: center;
            font-size: 1.5em;
            font-weight: 300;
            margin: 12px auto 24px;
            line-height: 1.5;
            max-width: 800px;
            color: var(--color-text-secondary);
        }

        .ControllerContainer {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin: 0 auto;
            padding: 10px 20px;
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius);
            width: fit-content;
        }

        .SubControllerContainer {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        label {
            font-size: 0.85em;
            font-weight: 600;
            color: var(--color-text-secondary);
            letter-spacing: 0.01em;
            white-space: nowrap;
            cursor: pointer;
        }

        select {
            font-family: var(--font-main);
            font-size: 0.85em;
            padding: 4px 8px;
            border: 1px solid var(--color-border);
            border-radius: 4px;
            background: var(--color-bg);
            color: var(--color-text);
            cursor: pointer;
            outline: none;
            transition: border-color 0.15s;
        }

        select:hover, select:focus {
            border-color: var(--color-accent);
        }

        input[type="checkbox"] {
            accent-color: var(--color-accent);
            cursor: pointer;
            width: 15px;
            height: 15px;
        }

        #over_time_plot {
            margin: 8px auto;
            max-width: 95vw;
            max-height: 500px;
        }

        #histogram {
            margin: 8px auto;
            max-width: 95vw;
            max-height: 400px;
        }

        #geography_heatmap {
            margin: 8px auto;
            width: 90vw;
            height: 50vw;
        }

        .MapControls {
            margin: 24px auto 4px;
            width: fit-content;
        }

        .radio-label {
            font-size: 0.85em;
            font-weight: 600;
            color: var(--color-text-secondary);
            letter-spacing: 0.01em;
        }

        .radio-option {
            font-size: 0.85em;
            font-weight: 400;
            cursor: pointer;
            gap: 3px;
        }

        .radio-option input[type="radio"] {
            accent-color: var(--color-accent);
            cursor: pointer;
        }

        .separator {
            width: 1px;
            height: 20px;
            background: var(--color-border);
        }

        /* ── Gear / settings button ── */
        .settings-wrapper {
            position: relative;
        }

        .settings-btn {
            background: none;
            border: 1px solid var(--color-border);
            border-radius: var(--radius);
            color: var(--color-text-secondary);
            cursor: pointer;
            padding: 3px 7px;
            font-size: 1em;
            display: flex;
            align-items: center;
            transition: color 0.15s, border-color 0.15s;
            line-height: 1;
        }

        .settings-btn:hover,
        .settings-btn[aria-expanded="true"] {
            color: var(--color-accent);
            border-color: var(--color-accent);
        }

        .settings-btn svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        /* ── Settings drop-down panel ── */
        .settings-panel {
            display: none;
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius);
            padding: 12px 16px;
            min-width: 180px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.45);
            z-index: 150;
            flex-direction: column;
            gap: 10px;
        }

        .settings-panel .SubControllerContainer {
            justify-content: space-between;
            width: 100%;
        }

        .settings-panel .SubControllerContainer input,
        .settings-panel .SubControllerContainer select {
            margin-left: auto;
        }

        .settings-panel.open {
            display: flex;
        }

        .settings-panel-title {
            font-size: 0.75em;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--color-text-secondary);
            border-bottom: 1px solid var(--color-border);
            padding-bottom: 6px;
            margin-bottom: 2px;
        }

        /* ── Info icon & tooltip ── */
        .info-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--color-text-secondary);
            color: var(--color-bg);
            font-size: 0.65rem;
            font-style: italic;
            font-weight: 700;
            cursor: help;
            flex-shrink: 0;
            user-select: none;
            position: relative;
        }

        .info-icon::after {
            content: attr(data-tooltip);
            position: absolute;
            right: calc(100% + 8px);
            top: 50%;
            transform: translateY(-50%);
            background: var(--color-header);
            color: var(--color-text);
            font-size: 0.8rem;
            font-style: normal;
            font-weight: 400;
            padding: 5px 10px;
            border-radius: var(--radius);
            white-space: nowrap;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.15s;
            z-index: 200;
            border: 1px solid var(--color-border);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
        }

        .info-icon:hover::after,
        .info-icon:focus::after {
            opacity: 1;
        }

        .tables-row {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin: 16px auto;
            max-width: 1100px;
            flex-wrap: wrap;
        }

        #top_regions_table,
        #aws_histogram {
            flex: 1;
            min-width: 300px;
            max-width: 500px;
        }

        #top_regions_table h3,
        #aws_histogram h3 {
            text-align: center;
            font-weight: 300;
            font-size: 1.1em;
            color: var(--color-text-secondary);
            margin: 0 0 8px;
        }

        #top_regions_table table,
        #aws_histogram table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85em;
        }

        #top_regions_table th,
        #aws_histogram th {
            text-align: left;
            font-weight: 600;
            color: var(--color-text-secondary);
            border-bottom: 2px solid var(--color-border);
            padding: 6px 12px;
        }

        #top_regions_table th:last-child,
        #aws_histogram th:last-child {
            text-align: right;
        }

        #top_regions_table td,
        #aws_histogram td {
            padding: 5px 12px;
            border-bottom: 1px solid var(--color-border);
            color: var(--color-text);
        }

        #top_regions_table td:last-child,
        #aws_histogram td:last-child {
            text-align: right;
            font-variant-numeric: tabular-nums;
        }

        #top_regions_table tr:hover td,
        #aws_histogram tr:hover td {
            background: var(--color-accent-subtle);
        }

        .attribution {
            text-align: center;
            font-size: 0.75em;
            color: var(--color-text-secondary);
            margin: 4px auto 16px;
        }

        .attribution a {
            color: var(--color-accent);
            text-decoration: none;
        }

        .attribution a:hover {
            text-decoration: underline;
        }

    </style>
</head>
<body>
    <header class="site-header">
        <a href="https://dandiarchive.org" class="site-brand" target="_blank" rel="noopener">DANDI</a>
        <span class="site-title">Access Summaries</span>
        <div class="site-header-spacer"></div>
        <a href="https://github.com/dandi/access-page" class="site-github-link" target="_blank" rel="noopener" aria-label="View on GitHub">
            <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
        </a>
    </header>
    <div class="page-content">
    <div class="ControllerContainer">
        <div class="SubControllerContainer">
            <label for="dandiset_selector">Dandiset:</label>
            <select id="dandiset_selector"></select>
        </div>
        <div class="separator"></div>
        <div class="settings-wrapper">
            <button class="settings-btn" id="settings_btn" aria-label="Open settings" aria-expanded="false" title="Settings">
                <svg viewBox="0 0 20 20" aria-hidden="true">
                    <path d="M10 13a3 3 0 1 0 0-6 3 3 0 0 0 0 6zm7.07-2.07a7.07 7.07 0 0 0 .07-.93 7.07 7.07 0 0 0-.07-.93l2-1.56a.48.48 0 0 0 .11-.61l-1.9-3.28a.48.48 0 0 0-.58-.21l-2.36.95a6.93 6.93 0 0 0-1.6-.93l-.36-2.51A.47.47 0 0 0 12 1H8a.47.47 0 0 0-.47.41l-.36 2.51a6.93 6.93 0 0 0-1.6.93L3.21 3.9a.47.47 0 0 0-.58.21L.73 7.38a.47.47 0 0 0 .11.61l2 1.56A7.2 7.2 0 0 0 2.77 10a7.2 7.2 0 0 0 .07.93l-2 1.56a.48.48 0 0 0-.11.61l1.9 3.28a.48.48 0 0 0 .58.21l2.36-.95c.5.35 1.03.64 1.6.93l.36 2.51c.06.24.27.41.52.41h3.8c.25 0 .46-.17.52-.41l.36-2.51a6.93 6.93 0 0 0 1.6-.93l2.36.95c.22.08.47 0 .58-.21l1.9-3.28a.47.47 0 0 0-.11-.61l-2-1.56z"/>
                </svg>
            </button>
            <div class="settings-panel" id="settings_panel" aria-hidden="true">
                <div class="settings-panel-title">Settings</div>
                <div class="SubControllerContainer">
                    <label for="log_scale">Log Scale</label>
                    <span class="info-icon" data-tooltip="Applies to non-geographic plots" tabindex="0" role="img" aria-label="Log Scale: Applies to non-geographic plots">i</span>
                    <input type="checkbox" id="log_scale" />
                </div>
                <div class="SubControllerContainer">
                    <label for="cumulative">Cumulative</label>
                    <span class="info-icon" data-tooltip="Only applies to Bytes Sent per Day" tabindex="0" role="img" aria-label="Cumulative: Only applies to Bytes Sent per Day">i</span>
                    <input type="checkbox" id="cumulative" />
                </div>
                <div class="SubControllerContainer">
                    <label for="prefix">Prefix</label>
                    <span class="info-icon" data-tooltip="Applies to totals and hover values" tabindex="0" role="img" aria-label="Prefix: Applies to totals and hover values">i</span>
                    <select id="prefix">
                        <option value="decimal">Decimal</option>
                        <option value="binary">Binary</option>
                    </select>
                </div>
            </div>
        </div>
    </div>
    <div id="totals"></div>
    <div id="over_time_plot"></div>
    <div id="over_time_data_link" class="attribution"></div>
    <div id="histogram"></div>
    <div id="histogram_data_link" class="attribution"></div>
    <div class="ControllerContainer MapControls">
        <div class="SubControllerContainer">
            <span class="radio-label">Map Style:</span>
            <label class="radio-option"><input type="radio" name="map_style" value="region" checked /> Regions</label>
            <label class="radio-option"><input type="radio" name="map_style" value="dots" /> Dots</label>
        </div>
    </div>
    <div id="geography_heatmap"></div>
    <div id="map_attribution" class="attribution">
        Boundaries: <a href="https://gadm.org/" target="_blank" rel="noopener">GADM v4.1</a>
    </div>
    <div id="region_data_link" class="attribution"></div>
    <div class="tables-row">
        <div id="top_regions_table"></div>
        <div id="aws_histogram"></div>
    </div>
    </div>
</body>
</html>
